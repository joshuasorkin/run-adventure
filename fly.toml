# fly.toml — run-adventure on Fly.io

app = 'run-adventure'
primary_region = 'sjc'

[build]
  [build.args]
    NEXT_PUBLIC_GOOGLE_MAPS_KEY = "" # Set via: fly secrets set NEXT_PUBLIC_GOOGLE_MAPS_KEY=your-key

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
